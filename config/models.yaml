# ============================================================================
# 模型目录 — 声明式配置，驱动 LLMFactory 和 UI 模型选择器
# ============================================================================

providers:
  # ------------------------------------------------------------------
  # 通义千问 (阿里云 DashScope)
  # ------------------------------------------------------------------
  qwen:
    display_name: "通义千问"
    env_api_key: "DASHSCOPE_API_KEY"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    models:
      - id: "qwen-plus-latest"
        name: "Qwen Plus"
        max_tokens: 8192
        default_temperature: 0.7
      - id: "qwen-max-latest"
        name: "Qwen Max"
        max_tokens: 8192
        default_temperature: 0.7
      - id: "qwen-turbo-latest"
        name: "Qwen Turbo"
        max_tokens: 8192
        default_temperature: 0.7

  # ------------------------------------------------------------------
  # DeepSeek
  # ------------------------------------------------------------------
  deepseek:
    display_name: "DeepSeek"
    env_api_key: "DEEPSEEK_API_KEY"
    base_url: "https://api.deepseek.com/v1"
    models:
      - id: "deepseek-chat"
        name: "DeepSeek V3"
        max_tokens: 8192
        default_temperature: 0.7
      - id: "deepseek-reasoner"
        name: "DeepSeek R1"
        max_tokens: 8192
        default_temperature: 0.7

  # ------------------------------------------------------------------
  # Anthropic Claude（可选）
  # ------------------------------------------------------------------
  anthropic:
    display_name: "Anthropic Claude"
    env_api_key: "ANTHROPIC_API_KEY"
    models:
      - id: "claude-sonnet-4-20250514"
        name: "Claude Sonnet 4"
        max_tokens: 8192
        default_temperature: 0.7
      - id: "claude-3-5-haiku-20241022"
        name: "Claude 3.5 Haiku"
        max_tokens: 4096
        default_temperature: 0.7

  # ------------------------------------------------------------------
  # 自定义 OpenAI 兼容 API（Ollama / vLLM / LM Studio 等）
  # ------------------------------------------------------------------
  custom:
    display_name: "自定义 API"
    description: "支持任意 OpenAI 兼容接口（Ollama、vLLM、LM Studio 等）"
    config_fields:
      - name: "base_url"
        label: "API Base URL"
        type: "text"
        placeholder: "http://localhost:11434/v1"
        required: true
      - name: "api_key"
        label: "API Key"
        type: "password"
        placeholder: "ollama 可留空"
        required: false
      - name: "model_name"
        label: "模型名称"
        type: "text"
        placeholder: "qwen2.5:7b / deepseek-v3 / llama3.1:8b"
        required: true

defaults:
  provider: "qwen"
  model: "qwen-plus-latest"
  temperature: 0.7
